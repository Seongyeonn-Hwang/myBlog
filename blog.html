<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Seongyeon Hwang</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    @font-face {
      font-family: 'NotoSansKR';
      src: url('font/NotoSansKR-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'NotoSansKR', 'Apple SD Gothic Neo', sans-serif;
      background: #1a1a1a;
      color: #c0c0c0;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== 목록 화면 ===== */
    #list-view {
      min-height: 100vh;
      padding: 48px 48px 120px;
    }

    /* ASCII 트리 */
    .ascii-tree {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre;
    }

    .ascii-root {
      color: #888;
      display: block;
      margin-bottom: 2px;
    }

    .ascii-folder {
      color: #888;
      display: block;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }
    .ascii-folder:hover { color: #c0c0c0; }

    .ascii-file {
      color: #c0c0c0;
      display: block;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }
    .ascii-file:hover { color: #fff; }
    .ascii-file.selected { color: #fff; }

    .ascii-date {
      color: #444;
      font-size: 12px;
    }

    .ascii-new {
      color: #e0883a;
      font-size: 11px;
      margin-left: 6px;
    }

    .ascii-children { display: block; }
    .ascii-children.hidden { display: none; }

    /* ===== 읽기 화면 ===== */
    #reader-view {
      display: none;
      padding: 72px 60px 120px;
      max-width: 860px;
    }

    /* ===== 마크다운 ===== */
    .md-body { font-size: 14px; line-height: 1.9; color: #bcbec4; }
    .md-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #dfe1e5; }
    .md-body h2 { font-size: 18px; font-weight: 600; margin: 24px 0 10px; color: #dfe1e5; }
    .md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #dfe1e5; }
    .md-body h4, .md-body h5, .md-body h6 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: #dfe1e5; }
    .md-body p { margin-bottom: 12px; }
    .md-body strong { font-weight: 600; color: #dfe1e5; }
    .md-body em { font-style: italic; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin: 4px 0; }
    .md-body blockquote {
      border-left: 3px solid #333;
      margin: 16px 0;
      padding: 8px 16px;
      color: #6f7074;
      font-style: italic;
    }
    .md-body code {
      background: #2b2b2b;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      border-radius: 3px;
      color: #98c379;
    }
    .md-body pre {
      background: #2b2b2b;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      border-radius: 4px;
    }
    .md-body pre code { background: none; padding: 0; color: #bcbec4; }
    .md-body hr { border: none; border-top: 1px solid #333; margin: 24px 0; }
    .md-body a { color: #98c379; text-decoration: underline; text-underline-offset: 2px; }
    .md-body table { border-collapse: collapse; width: auto; margin: 6px 0; line-height: 1.2; }
    .md-body th, .md-body td { border-bottom: 1px solid #333; padding: 1px 10px 1px 0; font-size: 14px; line-height: 1.2; }
    .md-body th { font-weight: 500; color: #dfe1e5; border-bottom-color: #555; }
    .md-body input[type="checkbox"] { margin-right: 6px; accent-color: #98c379; }

/* ===== Habit Tracker ===== */
    .habit-tracker-page { display: flex; flex-direction: column; gap: 14px; }
    .habit-card {
      background: #0f0f0f;
      border-radius: 16px;
      padding: 22px 24px 18px;
      font-family: 'Courier New', Consolas, monospace;
    }
    .habit-card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    .habit-name { color: #e2e2e2; font-size: 17px; font-weight: normal; }
    .habit-year { color: #505050; font-size: 15px; }
    .habit-grid-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .habit-grid-wrap::-webkit-scrollbar { display: none; }
    .habit-grid {
      display: grid;
      grid-template-rows: repeat(7, 5px);
      grid-auto-columns: 5px;
      grid-auto-flow: column;
      gap: 3px;
      width: max-content;
    }
    .habit-dot {
      width: 5px; height: 5px;
      border-radius: 1px;
      background: #242424;
      transition: background 0.1s;
    }
    .habit-dot.filled { background: #4a8c5c; }
    .habit-dot.is-today { background: #3a6ec0; }
    .habit-dot.is-today.filled { background: #4a8c5c; }
    .habit-dot.future, .habit-dot.off-year { background: #161616; }
    .habit-card-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
    }
    .habit-streak { color: #b0b0b0; font-size: 13px; }
    .habit-tag { color: #383838; font-size: 12px; }

    @media (max-width: 600px) {
      .habit-card { padding: 16px 16px 14px; border-radius: 12px; }
      .habit-card-header { margin-bottom: 12px; }
      .habit-name { font-size: 15px; }
      .habit-year { font-size: 13px; }
      .habit-grid {
        grid-template-rows: repeat(7, 8px);
        grid-auto-columns: 8px;
        gap: 4px;
      }
      .habit-dot { width: 8px; height: 8px; border-radius: 2px; }
      .habit-streak, .habit-tag { font-size: 12px; }
    }

    /* ===== Obsidian 특수 문법 ===== */
    .wiki-link {
      color: #6aab73;
      cursor: pointer;
      border-bottom: 1px dashed #6aab73;
      transition: opacity 0.15s;
    }
    .wiki-link:hover { opacity: 0.7; }

    .wiki-missing {
      color: #666;
      border-bottom: 1px dashed #444;
    }

    mark {
      background: #4a3f00;
      color: #f0c060;
      padding: 0 3px;
      border-radius: 2px;
    }

    .callout {
      border-left: 3px solid #555;
      background: #222;
      border-radius: 4px;
      margin: 16px 0;
      overflow: hidden;
    }
    .callout-title {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: #2a2a2a;
      color: #aaa;
      text-transform: uppercase;
    }
    .callout-body {
      padding: 10px 14px;
      font-size: 13px;
      color: #bcbec4;
      line-height: 1.7;
    }
    .callout-note    { border-color: #4a9eff; }
    .callout-note    .callout-title { color: #4a9eff; }
    .callout-tip, .callout-success { border-color: #6aab73; }
    .callout-tip .callout-title, .callout-success .callout-title { color: #6aab73; }
    .callout-warning, .callout-caution { border-color: #e0a850; }
    .callout-warning .callout-title, .callout-caution .callout-title { color: #e0a850; }
    .callout-danger, .callout-failure, .callout-bug { border-color: #e05b5b; }
    .callout-danger .callout-title, .callout-failure .callout-title, .callout-bug .callout-title { color: #e05b5b; }

    #list-back {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      color: #555;
      display: inline-block;
      margin-top: 48px;
      transition: color 0.15s;
    }
    #list-back:hover { color: #c0c0c0; }

    #back-btn {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      margin-top: 60px;
      display: inline-block;
      transition: color 0.15s;
    }
    #back-btn:hover { color: #c0c0c0; }

    @media (max-width: 600px) {
      #list-view { padding: 32px 20px 80px; }
      #reader-view { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

  <!-- 목록 화면 -->
  <div id="list-view">
    <div class="ascii-tree" id="file-tree"></div>
    <a href="index.html" id="list-back"><- back</a>
  </div>

  <!-- 읽기 화면 -->
  <div id="reader-view">
    <div class="md-body" id="reader-body"></div>
    <div id="back-btn"><- back</div>
  </div>

  <script src="blog_files.js"></script>
  <script>
    const listView   = document.getElementById('list-view');
    const readerView = document.getElementById('reader-view');
    const fileTree   = document.getElementById('file-tree');
    const readerBody = document.getElementById('reader-body');

    function stripFrontmatter(c) { return c.replace(/^---[\s\S]*?---\n?/, '').trim(); }
    function stripDataviewjs(c)  { return c.replace(/```dataviewjs[\s\S]*?```/g, '').trim(); }
    function hideSensitiveContent(c) { return c.replace(/\(!보안\)([\s\S]*?)\(보안!\)/g, (_, t) => t.replace(/[^\n]/g, '■')); }

    // 파일 이름 → item 매핑 (wiki link 연결용)
    const fileMap = {};
    function indexFiles(items) {
      items.forEach(item => {
        if (item.type === 'folder') indexFiles(item.children);
        else fileMap[item.name.toLowerCase()] = item;
      });
    }

    // Obsidian 문법 전처리
    function obsidianPreprocess(text) {
      // ![[임베드]] — 무시
      text = text.replace(/!\[\[([^\]]+)\]\]/g, '');

      // [[파일명|별칭]] / [[파일명]]
      text = text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, target, alias) => {
        const label   = alias || target;
        const key     = target.trim().toLowerCase();
        const linked  = fileMap[key];
        if (linked) {
          return `<span class="wiki-link" data-target="${key}">${label}</span>`;
        }
        return `<span class="wiki-missing">${label}</span>`;
      });

      // ==하이라이트==
      text = text.replace(/==(.+?)==/g, '<mark>$1</mark>');

      // Callout: > [!type] title
      text = text.replace(
        /^> \[!(NOTE|INFO|TIP|WARNING|DANGER|CAUTION|IMPORTANT|SUCCESS|QUESTION|FAILURE|BUG|EXAMPLE|QUOTE|ABSTRACT)\][ \t]*(.*)\n((?:>.*\n?)*)/gim,
        (_, type, title, body) => {
          const content = body.replace(/^> ?/gm, '').trim();
          const t = type.toLowerCase();
          return `<div class="callout callout-${t}"><div class="callout-title">${title || type}</div><div class="callout-body">${content}</div></div>\n`;
        }
      );

      return text;
    }

    function renderContent(content) {
      const raw     = stripFrontmatter(content || '');
      const cleaned = stripDataviewjs(raw);
      const secure  = hideSensitiveContent(cleaned);
      const obs     = obsidianPreprocess(secure);
      return marked.parse(obs, { breaks: true });
    }

    function openFile(item, el) {
      document.querySelectorAll('.ascii-file.selected').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');

      readerBody.innerHTML = renderContent(item.content);

      // Habit Tracker 특별 렌더링
      if (item.name === 'Habit Tracker') {
        // raw 마크다운에서 ## 섹션별로 습관 파싱
        const habits = [];
        const sections = item.content.split(/^##\s+/m).slice(1);
        sections.forEach(sec => {
          const lines = sec.trim().split('\n');
          const name = lines[0].trim();
          const dateText = lines.slice(1).join(' ');
          const dates = new Set((dateText.match(/\d{4}-\d{2}-\d{2}/g) || []));
          habits.push({ name, dates });
        });

        const year = new Date().getFullYear();
        const today = new Date(); today.setHours(0,0,0,0);

        function ds(d) {
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function calcStreak(dates) {
          let n = 0, d = new Date(today);
          while (dates.has(ds(d))) { n++; d.setDate(d.getDate()-1); }
          return n;
        }

        // 그리드 범위: 1월 1일 속한 주 일요일 ~ 12월 31일 속한 주 토요일
        const gridStart = new Date(year, 0, 1);
        gridStart.setDate(gridStart.getDate() - gridStart.getDay());
        const gridEnd = new Date(year, 11, 31);
        gridEnd.setDate(gridEnd.getDate() + (6 - gridEnd.getDay()));

        let html = '<div class="habit-tracker-page">';
        habits.forEach(({ name, dates }) => {
          let dots = '';
          const d = new Date(gridStart);
          while (d <= gridEnd) {
            const dateStr = ds(d);
            const inYear  = d.getFullYear() === year;
            const isToday = d.getTime() === today.getTime();
            const isFuture = d > today;
            const done    = dates.has(dateStr);
            let cls = 'habit-dot';
            if (!inYear)        cls += ' off-year';
            else if (isFuture)  cls += ' future';
            else if (done)      cls += ' filled';
            if (isToday)        cls += ' is-today';
            dots += `<div class="${cls}"></div>`;
            d.setDate(d.getDate() + 1);
          }
          const s = calcStreak(dates);
          html += `<div class="habit-card">
            <div class="habit-card-header">
              <span class="habit-name">${name}</span>
              <span class="habit-year">${year}</span>
            </div>
            <div class="habit-grid-wrap"><div class="habit-grid">${dots}</div></div>
            <div class="habit-card-footer">
              <span class="habit-streak">${s > 0 ? s+' day streak' : 'no streak yet'}</span>
              <span class="habit-tag">Habit Tracker</span>
            </div>
          </div>`;
        });
        html += '</div>';
        readerBody.innerHTML = html;
      }

      // wiki-link 클릭 이벤트
      readerBody.querySelectorAll('.wiki-link').forEach(link => {
        link.addEventListener('click', () => {
          const target = fileMap[link.dataset.target];
          if (target) openFile(target, el);
        });
      });

      listView.style.display   = 'none';
      readerView.style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ file: item.path }, '', '');

    }

    function showList() {
      readerView.style.display = 'none';
      listView.style.display   = 'block';
      window.scrollTo(0, 0);
    }

    window.addEventListener('popstate', showList);
    document.getElementById('back-btn').addEventListener('click', () => {
      history.back();
    });

    // 폴더 내 new 파일 존재 여부 재귀 확인
    function hasNew(items) {
      return items.some(item =>
        item.type === 'folder' ? hasNew(item.children) : isNew(item.date)
      );
    }

    // prefix: 각 행 앞에 붙는 ASCII 문자열 (부모로부터 전달)
    function buildTree(items, container, prefix) {
      items.forEach((item, i) => {
        const isLast    = i === items.length - 1;
        const connector = isLast ? '└- ' : '├- ';
        const childPfx  = isLast ? '   ' : '|  ';

        if (item.type === 'folder') {
          const folderEl = document.createElement('span');
          folderEl.className = 'ascii-folder';

          const childContainer = document.createElement('span');
          childContainer.className = 'ascii-children hidden';

          const folderNew = hasNew(item.children);
          let open = false;

          const update = () => {
            const newBadge = folderNew ? ` <span class="ascii-new">✦ New</span>` : '';
            folderEl.innerHTML = prefix + connector + (open ? '[-] ' : '[+] ') + item.name + newBadge;
            childContainer.className = 'ascii-children' + (open ? '' : ' hidden');
          };
          update();

          folderEl.addEventListener('click', () => { open = !open; update(); });

          buildTree(item.children, childContainer, prefix + childPfx);
          container.appendChild(folderEl);
          container.appendChild(childContainer);

        } else {
          const fileEl = document.createElement('span');
          fileEl.className = 'ascii-file';
          const datePart = item.date ? `<span class="ascii-date">  (${item.date})</span>` : '';
          const newBadge = isNew(item.date) ? `<span class="ascii-new">✦ New</span>` : '';
          fileEl.innerHTML = prefix + connector + item.name + datePart + newBadge;
          fileEl.addEventListener('click', () => openFile(item, fileEl));
          container.appendChild(fileEl);
        }
      });
    }

    // 일주일 이내 여부 확인
    function isNew(dateStr) {
      if (!dateStr) return false;
      const [y, m, d] = dateStr.split('.').map(Number);
      const fileDate  = new Date(y, m - 1, d);
      const diffDays  = (Date.now() - fileDate.getTime()) / (1000 * 60 * 60 * 24);
      return diffDays <= 7;
    }

    // 파일 인덱싱
    indexFiles(BLOG_FILES);

    // 루트
    const rootEl = document.createElement('span');
    rootEl.className = 'ascii-root';
    rootEl.textContent = 'blog/';
    fileTree.appendChild(rootEl);

    buildTree(BLOG_FILES, fileTree, '');
  </script>

</body>
</html>
