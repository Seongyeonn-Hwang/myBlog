<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Seongyeon Hwang</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @font-face {
      font-family: '2002';
      src: url('font/2002.ttf.ttf') format('truetype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: '2002', 'Apple SD Gothic Neo', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== 목록 화면 ===== */
    #list-view {
      padding: 80px 40px 120px;
    }

    .list-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .file-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 14px 0;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .file-item:hover { opacity: 0.5; }

    .file-item-name {
      font-size: 15px;
      font-weight: 400;
      color: #111;
    }

    .file-item-path {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.3px;
    }

    .folder-group { margin-bottom: 40px; }

    .folder-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      color: #ccc;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* ===== 읽기 화면 ===== */
    #reader-view {
      display: none;
      padding: 80px 40px 120px;
    }

    .reader-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-bottom: 52px;
      transition: color 0.15s;
    }
    .reader-back:hover { color: #111; }

    .reader-filename {
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.8px;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ebebeb;
    }

    /* ===== 마크다운 ===== */
    .md-body { font-size: 14px; line-height: 1.9; color: #333; }
    .md-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #111; }
    .md-body h2 { font-size: 18px; font-weight: 600; margin: 24px 0 10px; color: #111; }
    .md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #111; }
    .md-body h4, .md-body h5, .md-body h6 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: #111; }
    .md-body p { margin-bottom: 12px; }
    .md-body strong { font-weight: 600; color: #111; }
    .md-body em { font-style: italic; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin: 4px 0; }
    .md-body blockquote {
      border-left: 3px solid #e0e0e0;
      margin: 16px 0;
      padding: 8px 16px;
      color: #777;
      font-style: italic;
    }
    .md-body code {
      background: #f5f5f5;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      border-radius: 3px;
    }
    .md-body pre {
      background: #f5f5f5;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      border-radius: 4px;
    }
    .md-body pre code { background: none; padding: 0; }
    .md-body hr { border: none; border-top: 1px solid #ebebeb; margin: 24px 0; }
    .md-body a { color: #555; text-decoration: underline; text-underline-offset: 2px; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-body th, .md-body td { border: 1px solid #e0e0e0; padding: 8px 12px; font-size: 13px; }
    .md-body th { background: #f7f7f7; font-weight: 500; }

    @media (max-width: 600px) {
      #list-view, #reader-view { padding: 48px 24px 80px; }
    }
  </style>
</head>
<body>

  <!-- 목록 화면 -->
  <div id="list-view">
    <div id="file-list"></div>
  </div>

  <!-- 읽기 화면 -->
  <div id="reader-view">
    <div class="reader-back" id="back-btn">← back</div>
    <div class="reader-filename" id="reader-filename"></div>
    <div class="md-body" id="reader-body"></div>
  </div>

  <script src="blog_files.js"></script>
  <script>
    const listView       = document.getElementById('list-view');
    const readerView     = document.getElementById('reader-view');
    const fileList       = document.getElementById('file-list');
    const backBtn        = document.getElementById('back-btn');
    const readerFilename = document.getElementById('reader-filename');
    const readerBody     = document.getElementById('reader-body');

    function stripFrontmatter(content) {
      return content.replace(/^---[\s\S]*?---\n?/, '').trim();
    }

    function stripDataviewjs(content) {
      return content.replace(/```dataviewjs[\s\S]*?```/g, '').trim();
    }

    function openFile(item) {
      const raw     = stripFrontmatter(item.content || '');
      const cleaned = stripDataviewjs(raw);

      readerFilename.textContent = item.path;
      readerBody.innerHTML = marked.parse(cleaned);

      listView.style.display   = 'none';
      readerView.style.display = 'block';
      window.scrollTo(0, 0);
    }

    backBtn.addEventListener('click', () => {
      readerView.style.display = 'none';
      listView.style.display   = 'block';
      window.scrollTo(0, 0);
    });

    function collectFiles(items, folderName) {
      items.forEach(item => {
        if (item.type === 'folder') {
          collectFiles(item.children, item.name);
        } else {
          renderFileItem(item, folderName);
        }
      });
    }

    function renderFileItem(item, folderName) {
      const el = document.createElement('div');
      el.className = 'file-item';
      el.innerHTML = `
        <span class="file-item-name">- ${item.name}</span>
        ${folderName ? `<span class="file-item-path">${folderName}</span>` : ''}
      `;
      el.addEventListener('click', () => openFile(item));
      fileList.appendChild(el);
    }

    collectFiles(BLOG_FILES, '');
  </script>

</body>
</html>
