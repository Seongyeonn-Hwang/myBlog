<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Report — Seongyeon Hwang</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Inter', sans-serif;
      background: #1a1a1a;
      color: #c0c0c0;
      min-height: 100vh;
      padding: 48px;
    }

    a { color: inherit; text-decoration: none; }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #e0e0e0;
    }

    .nav {
      font-size: 13px;
      color: #555;
      transition: color 0.15s;
    }
    .nav:hover { color: #c0c0c0; }

    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 1.2px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 8px;
    }

    .iframe-wrap {
      width: 100%;
      background: #111;
      border-radius: 8px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
    }

    .link-btn {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 6px 16px;
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .link-btn:hover { color: #c0c0c0; border-color: #555; }

    @media (max-width: 600px) {
      body { padding: 24px 20px; }
      iframe { height: 400px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="title">Visitor Report</span>
    <a class="nav" href="index.html">← back</a>
  </div>

  <div class="section">
    <div class="section-title">Statistics</div>
    <div class="iframe-wrap">
      <iframe src="https://lifeissogood.goatcounter.com"></iframe>
    </div>
    <a class="link-btn" href="https://lifeissogood.goatcounter.com" target="_blank">↗ GoatCounter 대시보드 열기</a>
  </div>

  <script data-goatcounter="https://lifeissogood.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
