<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Seongyeon Hwang</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @font-face {
      font-family: '2002';
      src: url('font/2002.ttf.ttf') format('truetype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: '2002', 'Apple SD Gothic Neo', sans-serif;
      background: #1e1f22;
      color: #bcbec4;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== 목록 화면 — IntelliJ Project Panel ===== */
    #list-view {
      min-height: 100vh;
      background: #1e1f22;
    }

    /* 상단 패널 타이틀바 */
    .panel-titlebar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #2b2d30;
      border-bottom: 1px solid #1a1a1c;
      font-size: 11px;
      color: #7a7e85;
      letter-spacing: 0.3px;
      user-select: none;
    }
    .panel-titlebar-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6aab73;
    }

    /* 파일 트리 */
    .tree {
      padding: 4px 0;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 12.5px;
    }

    .tree-row {
      display: flex;
      align-items: center;
      height: 24px;
      padding-right: 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.08s;
    }
    .tree-row:hover { background: #2b2d30; }
    .tree-row.selected { background: #2e436e; color: #fff; }

    /* 인덴트 & 가이드라인 */
    .tree-indent {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .tree-guide {
      width: 16px;
      height: 24px;
      position: relative;
      flex-shrink: 0;
    }
    .tree-guide::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0; bottom: 0;
      border-left: 1px solid #393b40;
    }

    /* 토글 아이콘 */
    .tree-toggle {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #6f7074;
      font-size: 9px;
    }
    .tree-toggle.open::before { content: '▾'; }
    .tree-toggle.closed::before { content: '▸'; }
    .tree-toggle.leaf { cursor: default; }

    /* 아이콘 */
    .tree-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      margin-right: 5px;
    }

    .tree-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-label-folder { color: #bcbec4; }
    .tree-label-file   { color: #bcbec4; }
    .tree-label-date   { color: #5c6370; font-size: 11px; margin-left: 6px; }

    .tree-children { display: none; }
    .tree-children.open { display: block; }

    /* 루트 폴더명 */
    .tree-root-label {
      font-size: 11px;
      font-weight: 600;
      color: #bcbec4;
      letter-spacing: 0.5px;
    }

    /* ===== 읽기 화면 ===== */
    #reader-view {
      display: none;
      padding: 72px 60px 120px;
      max-width: 860px;
    }

    /* ===== 마크다운 ===== */
    .md-body { font-size: 14px; line-height: 1.9; color: #bcbec4; }
    .md-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #dfe1e5; }
    .md-body h2 { font-size: 18px; font-weight: 600; margin: 24px 0 10px; color: #dfe1e5; }
    .md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #dfe1e5; }
    .md-body h4, .md-body h5, .md-body h6 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: #dfe1e5; }
    .md-body p { margin-bottom: 12px; }
    .md-body strong { font-weight: 600; color: #dfe1e5; }
    .md-body em { font-style: italic; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin: 4px 0; }
    .md-body blockquote {
      border-left: 3px solid #393b40;
      margin: 16px 0;
      padding: 8px 16px;
      color: #6f7074;
      font-style: italic;
    }
    .md-body code {
      background: #2b2d30;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      border-radius: 3px;
      color: #6aab73;
    }
    .md-body pre {
      background: #2b2d30;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      border-radius: 4px;
    }
    .md-body pre code { background: none; padding: 0; color: #bcbec4; }
    .md-body hr { border: none; border-top: 1px solid #393b40; margin: 24px 0; }
    .md-body a { color: #6aab73; text-decoration: underline; text-underline-offset: 2px; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-body th, .md-body td { border: 1px solid #393b40; padding: 8px 12px; font-size: 13px; }
    .md-body th { background: #2b2d30; font-weight: 500; color: #dfe1e5; }
    .md-body input[type="checkbox"] { margin-right: 6px; accent-color: #6aab73; }

    @media (max-width: 600px) {
      #reader-view { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

  <!-- 목록 화면 -->
  <div id="list-view">
    <div class="panel-titlebar">
      <div class="panel-titlebar-dot"></div>
      Project
    </div>
    <div class="tree" id="file-tree"></div>
  </div>

  <!-- 읽기 화면 -->
  <div id="reader-view">
    <div class="md-body" id="reader-body"></div>
  </div>

  <script src="blog_files.js"></script>
  <script>
    const listView   = document.getElementById('list-view');
    const readerView = document.getElementById('reader-view');
    const fileTree   = document.getElementById('file-tree');
    const readerBody = document.getElementById('reader-body');

    function stripFrontmatter(content) {
      return content.replace(/^---[\s\S]*?---\n?/, '').trim();
    }
    function stripDataviewjs(content) {
      return content.replace(/```dataviewjs[\s\S]*?```/g, '').trim();
    }

    function openFile(item, rowEl) {
      document.querySelectorAll('.tree-row.selected').forEach(el => el.classList.remove('selected'));
      rowEl.classList.add('selected');

      const raw     = stripFrontmatter(item.content || '');
      const cleaned = stripDataviewjs(raw);
      readerBody.innerHTML = marked.parse(cleaned);

      listView.style.display   = 'none';
      readerView.style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ file: item.path }, '', '');
    }

    function showList() {
      readerView.style.display = 'none';
      listView.style.display   = 'block';
      window.scrollTo(0, 0);
    }

    window.addEventListener('popstate', showList);

    function buildTree(items, container, depth) {
      items.forEach(item => {
        if (item.type === 'folder') {
          // 폴더 행
          const row = document.createElement('div');
          row.className = 'tree-row';

          const indent = buildIndent(depth);
          const toggle = document.createElement('div');
          toggle.className = 'tree-toggle open';

          const icon = document.createElement('div');
          icon.className = 'tree-icon';
          icon.textContent = '📂';

          const label = document.createElement('span');
          label.className = 'tree-label tree-label-folder';
          label.textContent = item.name;

          row.appendChild(indent);
          row.appendChild(toggle);
          row.appendChild(icon);
          row.appendChild(label);

          // 자식
          const children = document.createElement('div');
          children.className = 'tree-children open';
          buildTree(item.children, children, depth + 1);

          row.addEventListener('click', () => {
            const isOpen = children.classList.toggle('open');
            toggle.className = `tree-toggle ${isOpen ? 'open' : 'closed'}`;
            icon.textContent = isOpen ? '📂' : '📁';
          });

          container.appendChild(row);
          container.appendChild(children);

        } else {
          // 파일 행
          const row = document.createElement('div');
          row.className = 'tree-row';

          const indent = buildIndent(depth);
          const spacer = document.createElement('div');
          spacer.className = 'tree-toggle leaf';

          const icon = document.createElement('div');
          icon.className = 'tree-icon';
          icon.textContent = '📄';

          const label = document.createElement('span');
          label.className = 'tree-label tree-label-file';
          label.textContent = item.name;

          const date = document.createElement('span');
          date.className = 'tree-label-date';
          date.textContent = item.date || '';

          row.appendChild(indent);
          row.appendChild(spacer);
          row.appendChild(icon);
          row.appendChild(label);
          row.appendChild(date);

          row.addEventListener('click', () => openFile(item, row));
          container.appendChild(row);
        }
      });
    }

    function buildIndent(depth) {
      const indent = document.createElement('div');
      indent.className = 'tree-indent';
      for (let i = 0; i < depth; i++) {
        const guide = document.createElement('div');
        guide.className = 'tree-guide';
        indent.appendChild(guide);
      }
      return indent;
    }

    // 루트 행
    const rootRow = document.createElement('div');
    rootRow.className = 'tree-row';
    rootRow.style.paddingLeft = '8px';
    const rootToggle = document.createElement('div');
    rootToggle.className = 'tree-toggle open';
    const rootIcon = document.createElement('div');
    rootIcon.className = 'tree-icon';
    rootIcon.textContent = '📂';
    const rootLabel = document.createElement('span');
    rootLabel.className = 'tree-root-label';
    rootLabel.textContent = 'blog';
    rootRow.appendChild(rootToggle);
    rootRow.appendChild(rootIcon);
    rootRow.appendChild(rootLabel);

    const rootChildren = document.createElement('div');
    rootChildren.className = 'tree-children open';
    buildTree(BLOG_FILES, rootChildren, 1);

    rootRow.addEventListener('click', () => {
      const isOpen = rootChildren.classList.toggle('open');
      rootToggle.className = `tree-toggle ${isOpen ? 'open' : 'closed'}`;
      rootIcon.textContent = isOpen ? '📂' : '📁';
    });

    fileTree.appendChild(rootRow);
    fileTree.appendChild(rootChildren);
  </script>

</body>
</html>
