<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Seongyeon Hwang</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @font-face {
      font-family: 'NotoSansKR';
      src: url('font/NotoSansKR-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'NotoSansKR', 'Apple SD Gothic Neo', sans-serif;
      background: #1a1a1a;
      color: #c0c0c0;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== 목록 화면 ===== */
    #list-view {
      min-height: 100vh;
      padding: 48px 48px 120px;
    }

    /* ASCII 트리 */
    .ascii-tree {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre;
    }

    .ascii-root {
      color: #888;
      display: block;
      margin-bottom: 2px;
    }

    .ascii-folder {
      color: #888;
      display: block;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }
    .ascii-folder:hover { color: #c0c0c0; }

    .ascii-file {
      color: #c0c0c0;
      display: block;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }
    .ascii-file:hover { color: #fff; }
    .ascii-file.selected { color: #fff; }

    .ascii-date {
      color: #444;
      font-size: 12px;
    }

    .ascii-new {
      color: #e0883a;
      font-size: 11px;
      margin-left: 6px;
    }

    .ascii-children { display: block; }
    .ascii-children.hidden { display: none; }

    /* ===== 읽기 화면 ===== */
    #reader-view {
      display: none;
      padding: 72px 60px 120px;
      max-width: 860px;
    }

    /* ===== 마크다운 ===== */
    .md-body { font-size: 14px; line-height: 1.9; color: #bcbec4; }
    .md-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #dfe1e5; }
    .md-body h2 { font-size: 18px; font-weight: 600; margin: 24px 0 10px; color: #dfe1e5; }
    .md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #dfe1e5; }
    .md-body h4, .md-body h5, .md-body h6 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: #dfe1e5; }
    .md-body p { margin-bottom: 12px; }
    .md-body strong { font-weight: 600; color: #dfe1e5; }
    .md-body em { font-style: italic; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin: 4px 0; }
    .md-body blockquote {
      border-left: 3px solid #333;
      margin: 16px 0;
      padding: 8px 16px;
      color: #6f7074;
      font-style: italic;
    }
    .md-body code {
      background: #2b2b2b;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      border-radius: 3px;
      color: #98c379;
    }
    .md-body pre {
      background: #2b2b2b;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      border-radius: 4px;
    }
    .md-body pre code { background: none; padding: 0; color: #bcbec4; }
    .md-body hr { border: none; border-top: 1px solid #333; margin: 24px 0; }
    .md-body a { color: #98c379; text-decoration: underline; text-underline-offset: 2px; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-body th, .md-body td { border: 1px solid #333; padding: 8px 12px; font-size: 13px; }
    .md-body th { background: #2b2b2b; font-weight: 500; color: #dfe1e5; }
    .md-body input[type="checkbox"] { margin-right: 6px; accent-color: #98c379; }

    /* ===== Obsidian 특수 문법 ===== */
    .wiki-link {
      color: #6aab73;
      cursor: pointer;
      border-bottom: 1px dashed #6aab73;
      transition: opacity 0.15s;
    }
    .wiki-link:hover { opacity: 0.7; }

    .wiki-missing {
      color: #666;
      border-bottom: 1px dashed #444;
    }

    mark {
      background: #4a3f00;
      color: #f0c060;
      padding: 0 3px;
      border-radius: 2px;
    }

    .callout {
      border-left: 3px solid #555;
      background: #222;
      border-radius: 4px;
      margin: 16px 0;
      overflow: hidden;
    }
    .callout-title {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: #2a2a2a;
      color: #aaa;
      text-transform: uppercase;
    }
    .callout-body {
      padding: 10px 14px;
      font-size: 13px;
      color: #bcbec4;
      line-height: 1.7;
    }
    .callout-note    { border-color: #4a9eff; }
    .callout-note    .callout-title { color: #4a9eff; }
    .callout-tip, .callout-success { border-color: #6aab73; }
    .callout-tip .callout-title, .callout-success .callout-title { color: #6aab73; }
    .callout-warning, .callout-caution { border-color: #e0a850; }
    .callout-warning .callout-title, .callout-caution .callout-title { color: #e0a850; }
    .callout-danger, .callout-failure, .callout-bug { border-color: #e05b5b; }
    .callout-danger .callout-title, .callout-failure .callout-title, .callout-bug .callout-title { color: #e05b5b; }

    #back-btn {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      margin-top: 60px;
      display: inline-block;
      transition: color 0.15s;
    }
    #back-btn:hover { color: #c0c0c0; }

    @media (max-width: 600px) {
      #list-view { padding: 32px 20px 80px; }
      #reader-view { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

  <!-- 목록 화면 -->
  <div id="list-view">
    <div class="ascii-tree" id="file-tree"></div>
  </div>

  <!-- 읽기 화면 -->
  <div id="reader-view">
    <div class="md-body" id="reader-body"></div>
    <div id="back-btn"><- back</div>
  </div>

  <script src="blog_files.js"></script>
  <script>
    const listView   = document.getElementById('list-view');
    const readerView = document.getElementById('reader-view');
    const fileTree   = document.getElementById('file-tree');
    const readerBody = document.getElementById('reader-body');

    function stripFrontmatter(c) { return c.replace(/^---[\s\S]*?---\n?/, '').trim(); }
    function stripDataviewjs(c)  { return c.replace(/```dataviewjs[\s\S]*?```/g, '').trim(); }

    // 파일 이름 → item 매핑 (wiki link 연결용)
    const fileMap = {};
    function indexFiles(items) {
      items.forEach(item => {
        if (item.type === 'folder') indexFiles(item.children);
        else fileMap[item.name.toLowerCase()] = item;
      });
    }

    // Obsidian 문법 전처리
    function obsidianPreprocess(text) {
      // ![[임베드]] — 무시
      text = text.replace(/!\[\[([^\]]+)\]\]/g, '');

      // [[파일명|별칭]] / [[파일명]]
      text = text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, target, alias) => {
        const label   = alias || target;
        const key     = target.trim().toLowerCase();
        const linked  = fileMap[key];
        if (linked) {
          return `<span class="wiki-link" data-target="${key}">${label}</span>`;
        }
        return `<span class="wiki-missing">${label}</span>`;
      });

      // ==하이라이트==
      text = text.replace(/==(.+?)==/g, '<mark>$1</mark>');

      // Callout: > [!type] title
      text = text.replace(
        /^> \[!(NOTE|INFO|TIP|WARNING|DANGER|CAUTION|IMPORTANT|SUCCESS|QUESTION|FAILURE|BUG|EXAMPLE|QUOTE|ABSTRACT)\][ \t]*(.*)\n((?:>.*\n?)*)/gim,
        (_, type, title, body) => {
          const content = body.replace(/^> ?/gm, '').trim();
          const t = type.toLowerCase();
          return `<div class="callout callout-${t}"><div class="callout-title">${title || type}</div><div class="callout-body">${content}</div></div>\n`;
        }
      );

      return text;
    }

    function renderContent(content) {
      const raw     = stripFrontmatter(content || '');
      const cleaned = stripDataviewjs(raw);
      const obs     = obsidianPreprocess(cleaned);
      return marked.parse(obs);
    }

    function openFile(item, el) {
      document.querySelectorAll('.ascii-file.selected').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');

      readerBody.innerHTML = renderContent(item.content);

      // wiki-link 클릭 이벤트
      readerBody.querySelectorAll('.wiki-link').forEach(link => {
        link.addEventListener('click', () => {
          const target = fileMap[link.dataset.target];
          if (target) openFile(target, el);
        });
      });

      listView.style.display   = 'none';
      readerView.style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ file: item.path }, '', '');
    }

    function showList() {
      readerView.style.display = 'none';
      listView.style.display   = 'block';
      window.scrollTo(0, 0);
    }

    window.addEventListener('popstate', showList);
    document.getElementById('back-btn').addEventListener('click', () => {
      history.back();
    });

    // 폴더 내 new 파일 존재 여부 재귀 확인
    function hasNew(items) {
      return items.some(item =>
        item.type === 'folder' ? hasNew(item.children) : isNew(item.date)
      );
    }

    // prefix: 각 행 앞에 붙는 ASCII 문자열 (부모로부터 전달)
    function buildTree(items, container, prefix) {
      items.forEach((item, i) => {
        const isLast    = i === items.length - 1;
        const connector = isLast ? '└- ' : '├- ';
        const childPfx  = isLast ? '   ' : '|  ';

        if (item.type === 'folder') {
          const folderEl = document.createElement('span');
          folderEl.className = 'ascii-folder';

          const childContainer = document.createElement('span');
          childContainer.className = 'ascii-children hidden';

          const folderNew = hasNew(item.children);
          let open = false;

          const update = () => {
            const newBadge = folderNew ? ` <span class="ascii-new">✦ New</span>` : '';
            folderEl.innerHTML = prefix + connector + (open ? '[-] ' : '[+] ') + item.name + newBadge;
            childContainer.className = 'ascii-children' + (open ? '' : ' hidden');
          };
          update();

          folderEl.addEventListener('click', () => { open = !open; update(); });

          buildTree(item.children, childContainer, prefix + childPfx);
          container.appendChild(folderEl);
          container.appendChild(childContainer);

        } else {
          const fileEl = document.createElement('span');
          fileEl.className = 'ascii-file';
          const datePart = item.date ? `<span class="ascii-date">  (${item.date})</span>` : '';
          const newBadge = isNew(item.date) ? `<span class="ascii-new">✦ New</span>` : '';
          fileEl.innerHTML = prefix + connector + item.name + datePart + newBadge;
          fileEl.addEventListener('click', () => openFile(item, fileEl));
          container.appendChild(fileEl);
        }
      });
    }

    // 일주일 이내 여부 확인
    function isNew(dateStr) {
      if (!dateStr) return false;
      const [y, m, d] = dateStr.split('.').map(Number);
      const fileDate  = new Date(y, m - 1, d);
      const diffDays  = (Date.now() - fileDate.getTime()) / (1000 * 60 * 60 * 24);
      return diffDays <= 7;
    }

    // 파일 인덱싱
    indexFiles(BLOG_FILES);

    // 루트
    const rootEl = document.createElement('span');
    rootEl.className = 'ascii-root';
    rootEl.textContent = 'blog/';
    fileTree.appendChild(rootEl);

    buildTree(BLOG_FILES, fileTree, '');
  </script>

</body>
</html>
