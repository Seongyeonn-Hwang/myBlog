<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Seongyeon Hwang</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @font-face {
      font-family: 'SunBatang';
      src: url('font/SunBatang-Medium.ttf') format('truetype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SunBatang', 'Apple SD Gothic Neo', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== 헤더 ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid #ebebeb;
      flex-shrink: 0;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto; padding: 0 40px;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-style: italic; font-weight: 700; font-size: 17px; }
    .nav { display: flex; align-items: center; gap: 10px; font-size: 12px; letter-spacing: 0.5px; color: #aaa; }
    .nav a { color: #aaa; transition: color 0.15s; }
    .nav a:hover, .nav a.active { color: #111; }
    .nav span { color: #ddd; }

    /* ===== 본문 레이아웃 ===== */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== 사이드바 (폴더 트리) ===== */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid #ebebeb;
      overflow-y: auto;
      padding: 28px 0;
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      color: #bbb;
      padding: 0 20px 14px;
      text-transform: uppercase;
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 20px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-item:hover { background: #f7f7f7; color: #111; }
    .tree-item.active { background: #f2f2f2; color: #111; font-weight: 500; }

    .tree-icon { font-size: 12px; flex-shrink: 0; color: #bbb; }

    .tree-children { display: none; }
    .tree-children.open { display: block; }
    .tree-children .tree-item { padding-left: 36px; }
    .tree-children .tree-children .tree-item { padding-left: 52px; }

    /* ===== 마크다운 뷰어 ===== */
    .viewer {
      flex: 1;
      overflow-y: auto;
      padding: 48px 60px;
    }

    .viewer-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 13px;
      color: #ccc;
      letter-spacing: 0.5px;
    }

    .viewer-filename {
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.8px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ebebeb;
    }

    /* 마크다운 스타일 */
    .md-body { font-size: 14px; line-height: 1.9; color: #333; max-width: 720px; }
    .md-body h1 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #111; }
    .md-body h2 { font-size: 18px; font-weight: 600; margin: 24px 0 10px; color: #111; }
    .md-body h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #111; }
    .md-body h4, .md-body h5, .md-body h6 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: #111; }
    .md-body p { margin-bottom: 12px; }
    .md-body strong { font-weight: 600; color: #111; }
    .md-body em { font-style: italic; }
    .md-body ul, .md-body ol { margin: 8px 0 12px 20px; }
    .md-body li { margin: 4px 0; }
    .md-body blockquote {
      border-left: 3px solid #e0e0e0;
      margin: 16px 0;
      padding: 8px 16px;
      color: #777;
      font-style: italic;
    }
    .md-body code {
      background: #f5f5f5;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      border-radius: 3px;
    }
    .md-body pre {
      background: #f5f5f5;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      border-radius: 4px;
    }
    .md-body pre code { background: none; padding: 0; }
    .md-body hr { border: none; border-top: 1px solid #ebebeb; margin: 24px 0; }
    .md-body a { color: #555; text-decoration: underline; text-underline-offset: 2px; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-body th, .md-body td { border: 1px solid #e0e0e0; padding: 8px 12px; font-size: 13px; }
    .md-body th { background: #f7f7f7; font-weight: 500; }

    /* frontmatter 숨김 */
    .md-body .frontmatter { display: none; }

    /* ===== 반응형 ===== */
    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .viewer { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">Seongyeon Hwang</a>
      <nav class="nav">
        <a href="index.html">home</a>
        <span>/</span>
        <a href="blog.html" class="active">blog</a>
        <span>/</span>
        <a href="about.html">about</a>
      </nav>
    </div>
  </header>

  <div class="workspace">
    <aside class="sidebar">
      <div class="sidebar-title">Blog</div>
      <div id="tree-root"></div>
    </aside>

    <main class="viewer" id="viewer">
      <div class="viewer-empty">파일을 선택하세요</div>
    </main>
  </div>

  <script src="blog_files.js"></script>
  <script>
    const treeRoot = document.getElementById('tree-root');
    const viewer   = document.getElementById('viewer');

    function stripFrontmatter(content) {
      return content.replace(/^---[\s\S]*?---\n?/, '').trim();
    }

    function stripDataviewjs(content) {
      return content.replace(/```dataviewjs[\s\S]*?```/g, '').trim();
    }

    function renderFile(item) {
      const raw     = stripFrontmatter(item.content || '');
      const cleaned = stripDataviewjs(raw);
      const html    = marked.parse(cleaned);

      viewer.innerHTML = `
        <div class="viewer-filename">${item.path}</div>
        <div class="md-body">${html}</div>
      `;
    }

    function buildTree(items, container) {
      items.forEach(item => {
        if (item.type === 'folder') {
          const wrapper  = document.createElement('div');
          const row      = document.createElement('div');
          const children = document.createElement('div');

          row.className = 'tree-item';
          row.innerHTML = `<span class="tree-icon">▶</span><span>${item.name}</span>`;
          children.className = 'tree-children';

          row.addEventListener('click', () => {
            const open = children.classList.toggle('open');
            row.querySelector('.tree-icon').textContent = open ? '▼' : '▶';
          });

          buildTree(item.children, children);
          wrapper.appendChild(row);
          wrapper.appendChild(children);
          container.appendChild(wrapper);

        } else {
          const row = document.createElement('div');
          row.className = 'tree-item';
          row.innerHTML = `<span class="tree-icon">—</span><span>${item.name}</span>`;

          row.addEventListener('click', () => {
            document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
            row.classList.add('active');
            renderFile(item);
          });

          container.appendChild(row);
        }
      });
    }

    buildTree(BLOG_FILES, treeRoot);
  </script>

</body>
</html>
